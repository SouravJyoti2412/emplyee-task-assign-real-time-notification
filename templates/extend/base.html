{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="{% block description %}Default Description{% endblock %}">
    <meta name="keywords" content="{% block keywords %}chicken, food, restaurant{% endblock %}">
    <meta name="author" content="{% block author %}Chicken Express{% endblock %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | {% block title %}{% endblock %}</title>
    <!-- Custom Link -->
    <link rel="stylesheet" type="text/css" href="{% static '/assets/css/bundle0ae1.css' %}" />
    <link rel="stylesheet" type="text/css" href="{% static '/assets/css/app0ae1.css' %}" />
    {% block style %}{% endblock %}
</head>
<body class="tyn-body">
    {% if 'login' or  'register' in request.path %}
    {% comment %} <script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleLogin()"></script> {% endcomment %}
    <script src="https://apis.google.com/js/api.js"></script>
    {% else %}
        {% include 'include/header.html' %}
    {% endif %}
    <!-- content Section -->
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script src="{% static 'assets/js/bundle0ae1.js' %}"></script>
    <script src="{% static 'assets/js/app0ae1.js' %}"></script>


<script>
    window.addEventListener("DOMContentLoaded", function () {
        const token = localStorage.getItem("accessToken");

        const currentPath = window.location.pathname;

        const data = {
            token: token,
            page_url: currentPath
        };

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== "") {
                const cookies = document.cookie.split(";");
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.startsWith(name + "=")) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        fetch("/api/login-redirection/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            credentials: "include",
            body: JSON.stringify(data)
        })
        .then(response => response.json().then(data => ({ status: response.status, body: data })))
        .then(result => {
            const redirectedPath = result.body.page_url;
            // 🔁 Prevent redirect loop
            if (redirectedPath !== currentPath) {
                window.location.href = redirectedPath;
            }
        })
        .catch(error => {
            console.error("Login redirection error:", error);
            if (currentPath !== "/chat/login/") {
                window.location.href = "/chat/login/";
            }
        });
    });
</script>


</body>

</html>
